# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main", "decouple-logging-serilog-to-mel" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - name: Compute package version
      id: version
      run: |
        VERSION="$(date +'%Y.%m').${{ github.run_number }}"
        if [ "${{ github.ref }}" != "refs/heads/main" ]; then
          VERSION="${VERSION}-beta"
        fi
        echo "Building version $VERSION"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - uses: actions/checkout@master
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: | 
          6.0.x
          8.0.x
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore
    
    - name: Test
      run: dotnet test --no-build --verbosity normal
    
    - name: Setup Github Packages
      run: dotnet nuget add source --username ant-car --password ${{ secrets.GITHUB_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/AV-Coders/index.json"

    - name: Pack NuGet packages
      run: dotnet pack "C Sharp Device Library.sln" --output /home/runner/work/c-sharp-device-library/package /p:Version=${{ steps.version.outputs.version }} --configuration Release

    - name: Publish to GitHub Packages 
      run: dotnet nuget push /home/runner/work/c-sharp-device-library/package/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }}  --source "github"
      
    - name: Notify on Error
      uses: skitionek/notify-microsoft-teams@master
      if: failure()
      with:
        webhook_url: ${{ secrets.MSTEAMS_WEBHOOK }}
